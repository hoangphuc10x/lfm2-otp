# File nộp cho BTC. Trỏ image đã push Public lên Docker Hub (RULES.md R4).
# CÁC DÒNG có "#Don't change this to vllm-server" PHẢI GIỮ NGUYÊN (RULES.md R1.6).
#
# part11 = part2 (sync FP8) + --enforce-eager.  Đổi 1 BIẾN so với nền banked part2.
# ⚠️ Dùng lại image sub-01 (chỉ đổi command, KHÔNG build lại).
services:
  model:
    image: hoangphuc109/lfm2-otp:sub-01   # <-- dùng lại (command-only change)
    entrypoint:
      - python3                                    #Don't change this to vllm-server
      - -m                                         #Don't change this to vllm-server
      - vllm.entrypoints.openai.api_server         #Don't change this to vllm-server
    command:
      - --model=/model                             #Don't change this to vllm-server
      - --served-model-name=LFM2.5-1.2B-Instruct   #Don't change this to vllm-server
      - --host=0.0.0.0                             #Don't change this to vllm-server
      - --port=8000                                #Don't change this to vllm-server
      - --max-model-len=4608
      - --gpu-memory-utilization=0.92
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --kv-cache-dtype=fp8
      - --quantization=fp8
      # ---- part11: --enforce-eager -> DIỆT COLD-START FAIL bằng giảm startup time ----
      # Bối cảnh: part9 (full-decode CUDA graph) = NO-OP trên TPOT (vẫn 4ms) nhưng để lại 75 fail.
      #   Grading MỚI chấm cả 420 (không miễn warmup) -> request Poisson đến sớm rơi vào cửa sổ
      #   container CHƯA-READY -> fail. Proxy gate port bị cấm (R1.6/R1.7) -> đòn bẩy hợp lệ DUY NHẤT
      #   còn lại cho fails = GIẢM TỔNG STARTUP TIME để engine ready sớm hơn.
      # --enforce-eager: bỏ torch.compile + CUDA graph capture lúc startup (nguồn tốn thời gian nhất
      #   cho model 1.2B) -> engine ready sớm -> ít request rơi vào cửa sổ chết -> ít fail.
      #   Vì full-graph đã chứng minh không giúp TPOT (part9) nên bỏ graph gần như MIỄN PHÍ.
      # RỦI RO: eager (không graph gì cả) có thể làm TPOT nhích 4->~5-6ms. Nếu fail giảm mạnh -> vẫn lời.
      #   Nếu fail KHÔNG giảm -> fails là structural (BTC bắn từ t=0) -> rollback part2, khóa hướng fails.
      - --enforce-eager
    ports:
      - "8000:8000"
    shm_size: "2g"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
