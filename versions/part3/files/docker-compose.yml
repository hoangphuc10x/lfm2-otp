# PART 3 — thêm SPECULATIVE DECODING (n-gram / prompt-lookup) trên nền part2 (FP8).
# Thay đổi 1 biến so với part2. Đòn bẩy TPOT. KHÔNG ảnh hưởng accuracy (greedy -> output y hệt).
# Image dùng lại (spec decode là flag runtime) -> không build lại.
services:
  model:
    image: hoangphuc109/lfm2-otp:sub-01   # dùng lại image, config qua command
    entrypoint:
      - python3                                    #Don't change this to vllm-server
      - -m                                         #Don't change this to vllm-server
      - vllm.entrypoints.openai.api_server         #Don't change this to vllm-server
    command:
      - --model=/model                             #Don't change this to vllm-server
      - --served-model-name=LFM2.5-1.2B-Instruct   #Don't change this to vllm-server
      - --host=0.0.0.0                             #Don't change this to vllm-server
      - --port=8000                                #Don't change this to vllm-server
      - --max-model-len=4608
      - --gpu-memory-utilization=0.92
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --kv-cache-dtype=fp8
      - --quantization=fp8
      # ★ THAY ĐỔI part3: n-gram (prompt-lookup) speculative decoding.
      #   Multi-turn lặp context nhiều -> acceptance cao -> TPOT giảm mạnh.
      #   Lossless với greedy: KHÔNG đổi output -> Δ accuracy = 0 (an toàn tuyệt đối).
      - '--speculative-config={"method": "ngram", "num_speculative_tokens": 5, "prompt_lookup_max": 4, "prompt_lookup_min": 2}'
    ports:
      - "8000:8000"
    shm_size: "2g"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
