# File nộp cho BTC. Trỏ image đã push Public lên Docker Hub (RULES.md R4).
# CÁC DÒNG có "#Don't change this to vllm-server" PHẢI GIỮ NGUYÊN (RULES.md R1.6).
#
# part10 = part9 (sync + full-decode CUDA graph) + --async-scheduling.
# ⚠️ Dùng lại image sub-01 (chỉ đổi command, KHÔNG build lại).
services:
  model:
    image: hoangphuc109/lfm2-otp:sub-01   # <-- dùng lại (command-only change)
    entrypoint:
      - python3                                    #Don't change this to vllm-server
      - -m                                         #Don't change this to vllm-server
      - vllm.entrypoints.openai.api_server         #Don't change this to vllm-server
    command:
      - --model=/model                             #Don't change this to vllm-server
      - --served-model-name=LFM2.5-1.2B-Instruct   #Don't change this to vllm-server
      - --host=0.0.0.0                             #Don't change this to vllm-server
      - --port=8000                                #Don't change this to vllm-server
      - --max-model-len=4608
      - --gpu-memory-utilization=0.92
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --kv-cache-dtype=fp8
      - --quantization=fp8
      # ---- part10: async (TTFT) + full-graph reduced-capture (TPOT + FAIL mitigation) ----
      # async-scheduling: TTFT 80->~44ms (overlap scheduler với GPU trên host 3-CPU).
      #   RỦI RO: vLLM ghi nhận async có thể crash/bất ổn dưới tải (bug reports). Rollback = part9/part2.
      - --async-scheduling
      # full-decode CUDA graph + cudagraph_capture_sizes NHỎ [1..16]:
      #   (a) TPOT: graph hóa decode -> cắt launch overhead (4->~2ms).
      #   (b) FAIL: capture nhanh (~5 sizes thay vì mặc định ~67 -> ~54s) => engine SẴN SÀNG sớm
      #       => thu hẹp cửa sổ "/health=200 nhưng chưa ready" (nguyên nhân ~89 cold-start fail của async).
      #   (c) né crash Mamba causal_conv1d_update (PR #34571) nhờ cap size nhỏ.
      # QUOTING: 1 scalar single-quote (bài học part3).
      - '--compilation-config={"cudagraph_mode":"FULL_AND_PIECEWISE","cudagraph_capture_sizes":[1,2,4,8,16]}'
    ports:
      - "8000:8000"
    shm_size: "2g"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
