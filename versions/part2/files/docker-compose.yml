# PART 2 — thêm FP8 WEIGHT quantization (thay đổi 1 biến so với part1).
# Đổi image tag -> sub-02. Giữ nguyên các dòng #Don't change this to vllm-server.
services:
  model:
    image: hoangphuc109/lfm2-otp:sub-01   # <-- tag mới cho part2
    entrypoint:
      - python3                                    #Don't change this to vllm-server
      - -m                                         #Don't change this to vllm-server
      - vllm.entrypoints.openai.api_server         #Don't change this to vllm-server
    command:
      - --model=/model                             #Don't change this to vllm-server
      - --served-model-name=LFM2.5-1.2B-Instruct   #Don't change this to vllm-server
      - --host=0.0.0.0                             #Don't change this to vllm-server
      - --port=8000                                #Don't change this to vllm-server
      - --max-model-len=4608
      - --gpu-memory-utilization=0.92
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --kv-cache-dtype=fp8
      # ★ THAY ĐỔI part2: online FP8 weight quant (W8A8). Weights BF16 -> FP8.
      #   Kỳ vọng: decode ~1.5-2x nhanh hơn (memory-bound) -> TPOT 5ms -> ~2.5-3ms;
      #   prefill nhanh hơn -> TTFT giảm. RỦI RO: Δ accuracy tăng -> BẮT BUỘC chạy GPQA
      #   kiểm Δ ≤ 0.10 trước khi coi là bài chốt.
      - --quantization=fp8
    ports:
      - "8000:8000"
    shm_size: "2g"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
