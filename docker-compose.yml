# File nộp cho BTC. Trỏ image đã push Public lên Docker Hub (RULES.md R4).
# CÁC DÒNG có "#Don't change this to vllm-server" PHẢI GIỮ NGUYÊN (RULES.md R1.6).
#
# ⚠️ Đổi hoangphuc109/lfm2-otp:sub-01 thành image:tag thật đã push.
services:
  model:
    image: hoangphuc109/lfm2-otp:sub-01   # <-- part2 (FP8, ổn định 55.23)
    entrypoint:
      - python3                                    #Don't change this to vllm-server
      - -m                                         #Don't change this to vllm-server
      - vllm.entrypoints.openai.api_server         #Don't change this to vllm-server
    command:
      - --model=/model                             #Don't change this to vllm-server
      - --served-model-name=LFM2.5-1.2B-Instruct   #Don't change this to vllm-server
      - --host=0.0.0.0                             #Don't change this to vllm-server
      - --port=8000                                #Don't change this to vllm-server
      # --- Tham số tối ưu (mọi giá trị đều justify được — RULES.md R2.6) ---
      # Context thật ~4k input + 200 output. 4608 = đệm an toàn, tiết kiệm KV cache
      # so với 32768 của mẫu -> nhiều slot concurrency hơn.
      - --max-model-len=4608
      - --gpu-memory-utilization=0.92
      - --tensor-parallel-size=1
      # Multi-turn -> prefix caching cho hit rate cao -> giảm TTFT mạnh.
      - --enable-prefix-caching
      # KV cache FP8 -> gấp đôi số token cache được (kiểm Δ accuracy trước khi chốt).
      - --kv-cache-dtype=fp8
      # part2: online FP8 weight quant -> decode/prefill nhanh hơn (memory-bound). +11.4đ.
      # BẮT BUỘC kiểm Δ ≤ 0.10 (GPQA) trước khi chốt. Nếu server không lên -> xem part2/SUMMARY.md.
      - --quantization=fp8
      # part4: async scheduling -> giảm overhead scheduler CPU, lấp gap GPU.
      # Rất hợp nút cổ chai 3-CPU của BTC -> kỳ vọng TTFT ↓. An toàn (không model-specific).
      - --async-scheduling
      # part3 (spec decode) ĐÃ BỎ HẲN: crash engine với LFM2 hybrid/mamba (500/503 kể cả warm).
      # CUDA graphs bật (KHÔNG dùng --enforce-eager) -> giảm overhead TTFT batch nhỏ.
    ports:
      - "8000:8000"
    shm_size: "2g"
    # part5: healthcheck WARMUP — gọi 1 request sinh chữ thật thay vì chỉ ping /health.
    # Chỉ báo "healthy" khi model ĐÃ compile xong + sinh được token nhanh -> BTC chỉ bắt
    # đầu chấm khi model đã nóng -> diệt fail cold-start (74 fail của part4).
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import urllib.request,json,sys;
          d=json.dumps({'model':'LFM2.5-1.2B-Instruct','prompt':'ready','max_tokens':8,'temperature':0}).encode();
          req=urllib.request.Request('http://localhost:8000/v1/completions',data=d,headers={'Content-Type':'application/json'});
          sys.exit(0 if 'text' in urllib.request.urlopen(req,timeout=35).read().decode() else 1)"
      interval: 15s
      timeout: 40s
      retries: 40
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
